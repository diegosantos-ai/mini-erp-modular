services:
  postgres:
    image: postgres:16-alpine
    container_name: minierp-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-minierp}
      POSTGRES_USER: ${POSTGRES_USER:-minierp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?configure POSTGRES_PASSWORD in .env or in the shell}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - minierp-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  minierp-postgres-data:
